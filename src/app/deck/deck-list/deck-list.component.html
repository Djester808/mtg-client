<div class="list-shell" (click)="closeMenu()">

  <div class="list-bg">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>
  </div>

  <!-- Header -->
  <header class="list-header">
    <button class="back-btn" (click)="goHome()">← Home</button>
    <div class="header-title">
      <span class="header-mark">⊗</span>
      <h1>My Decks</h1>
    </div>
    <button class="create-btn" (click)="openCreateForm()">+ New Deck</button>
  </header>

  <!-- Content -->
  <main class="list-content">

    <div class="loading-state" *ngIf="loading$ | async">Loading decks…</div>

    <ng-container *ngIf="!(loading$ | async)">

      <!-- Empty state -->
      <div class="empty-state" *ngIf="sortedDecks.length === 0">
        <div class="empty-icon">⊗</div>
        <p class="empty-title">No decks yet</p>
        <p class="empty-sub">Build your first deck to start playing.</p>
        <button class="create-btn" (click)="openCreateForm()">+ New Deck</button>
      </div>

      <!-- Grid -->
      <div class="deck-grid" *ngIf="sortedDecks.length > 0">
        <div
          class="deck-card"
          *ngFor="let deck of sortedDecks"
          draggable="true"
          [class.is-dragging]="dragDeckId === deck.id"
          [class.is-drag-over]="dragOverDeckId === deck.id"
          (dragstart)="onDeckDragStart(deck, $event)"
          (dragover)="onDeckDragOver(deck, $event)"
          (drop)="onDeckDrop(deck, $event)"
          (dragend)="onDeckDragEnd()"
          (click)="openDeck(deck.id)"
        >
          <!-- Cover art -->
          <div class="deck-cover"
               [style.backgroundImage]="coverUri(deck) ? 'url(' + coverUri(deck) + ')' : 'none'"
               [class.no-cover]="!coverUri(deck)">
            <span class="no-cover-icon" *ngIf="!coverUri(deck)">⊗</span>
          </div>

          <div class="deck-info">
            <!-- Name or rename input -->
            <h3 class="deck-name" *ngIf="renamingDeckId !== deck.id">{{ deck.name }}</h3>
            <input
              *ngIf="renamingDeckId === deck.id"
              class="rename-input"
              [(ngModel)]="renameDraft"
              (click)="$event.stopPropagation()"
              (keydown.enter)="commitRename(deck)"
              (keydown.escape)="cancelRename()"
              (blur)="commitRename(deck)"
              autofocus
            />

            <div class="deck-meta">
              <span class="card-count">{{ deck.cardCount }} card{{ deck.cardCount !== 1 ? 's' : '' }}</span>

              <div class="deck-actions" (click)="$event.stopPropagation()">
                <!-- 3-dot menu button -->
                <button class="menu-btn" (click)="toggleMenu($event, deck.id)" title="Options">⋮</button>

                <!-- Dropdown -->
                <div class="deck-menu" *ngIf="menuDeckId === deck.id">
                  <button class="menu-item" (click)="startRename($event, deck)">✎ Rename</button>
                  <button class="menu-item" (click)="openCoverPicker($event, deck)">⊙ Set Cover Image</button>
                  <div class="menu-divider"></div>
                  <button class="menu-item menu-item-danger" (click)="deleteDeck($event, deck.id)">✕ Delete</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </ng-container>
  </main>

  <!-- Create modal -->
  <div class="modal-overlay" *ngIf="showCreateForm" (click)="closeCreateForm()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>New Deck</h2>
        <button class="modal-close" (click)="closeCreateForm()">✕</button>
      </div>
      <form [formGroup]="createForm" (ngSubmit)="submitCreate()" class="modal-body">
        <div class="form-field">
          <label class="form-label">Deck Name</label>
          <input
            class="form-input"
            type="text"
            formControlName="name"
            placeholder="e.g. Mono Red Aggro"
            autofocus
          />
        </div>
        <div class="modal-actions">
          <button type="button" class="cancel-btn" (click)="closeCreateForm()">Cancel</button>
          <button type="submit" class="submit-btn" [disabled]="createForm.invalid">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Cover picker modal -->
  <app-cover-picker-modal
    *ngIf="coverPickerDeck"
    [currentCoverUri]="coverPickerDeck.coverUri ?? null"
    (coverSelected)="onCoverSelected(coverPickerDeck, $event)"
    (closed)="closeCoverPicker()"
  ></app-cover-picker-modal>

</div>
