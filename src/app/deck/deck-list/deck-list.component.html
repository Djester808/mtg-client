<div class="list-shell">

  <div class="list-bg">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>
  </div>

  <!-- Header -->
  <header class="list-header">
    <button class="back-btn" (click)="goHome()">← Home</button>
    <div class="header-title">
      <span class="header-mark">⊗</span>
      <h1>My Decks</h1>
    </div>
    <button class="create-btn" (click)="openCreateForm()">+ New Deck</button>
  </header>

  <!-- Content -->
  <main class="list-content">

    <div class="loading-state" *ngIf="loading$ | async">Loading decks…</div>

    <ng-container *ngIf="!(loading$ | async)">

      <!-- Empty state -->
      <div class="empty-state" *ngIf="(decks$ | async)?.length === 0">
        <div class="empty-icon">⊗</div>
        <p class="empty-title">No decks yet</p>
        <p class="empty-sub">Build your first deck to start playing.</p>
        <button class="create-btn" (click)="openCreateForm()">+ New Deck</button>
      </div>

      <!-- Grid -->
      <div class="deck-grid" *ngIf="(decks$ | async)?.length">
        <div
          class="deck-card"
          *ngFor="let deck of (decks$ | async)"
          (click)="openDeck(deck.id)"
        >
          <!-- Cover art -->
          <div class="deck-cover"
               [style.backgroundImage]="coverUri(deck) ? 'url(' + coverUri(deck) + ')' : 'none'"
               [class.no-cover]="!coverUri(deck)">
            <span class="no-cover-icon" *ngIf="!coverUri(deck)">⊗</span>
          </div>

          <div class="deck-info">
            <h3 class="deck-name">{{ deck.name }}</h3>
            <div class="deck-meta">
              <span class="card-count">{{ deck.cardCount }} card{{ deck.cardCount !== 1 ? 's' : '' }}</span>
              <button class="delete-btn" (click)="deleteDeck($event, deck.id)" title="Delete deck">✕</button>
            </div>
          </div>
        </div>
      </div>

    </ng-container>
  </main>

  <!-- Create modal -->
  <div class="modal-overlay" *ngIf="showCreateForm" (click)="closeCreateForm()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>New Deck</h2>
        <button class="modal-close" (click)="closeCreateForm()">✕</button>
      </div>
      <form [formGroup]="createForm" (ngSubmit)="submitCreate()" class="modal-body">
        <div class="form-field">
          <label class="form-label">Deck Name</label>
          <input
            class="form-input"
            type="text"
            formControlName="name"
            placeholder="e.g. Mono Red Aggro"
            autofocus
          />
        </div>
        <div class="modal-actions">
          <button type="button" class="cancel-btn" (click)="closeCreateForm()">Cancel</button>
          <button type="submit" class="submit-btn" [disabled]="createForm.invalid">Create</button>
        </div>
      </form>
    </div>
  </div>

</div>
