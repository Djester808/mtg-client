<div class="list-shell" (click)="closeMenu()">

  <div class="list-bg">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>
  </div>

  <!-- Header -->
  <header class="list-header">
    <button class="back-btn" (click)="goHome()">← Home</button>
    <div class="header-title">
      <span class="header-mark">✦</span>
      <h1>My Collections</h1>
    </div>
    <button class="create-btn" (click)="openCreateForm()">+ New Collection</button>
  </header>

  <!-- Content -->
  <main class="list-content">

    <div class="loading-state" *ngIf="loading$ | async">Loading collections…</div>

    <ng-container *ngIf="!(loading$ | async)">

      <!-- Empty state -->
      <div class="empty-state" *ngIf="(collections$ | async)?.length === 0">
        <div class="empty-icon"><i class="bi bi-collection"></i></div>
        <p class="empty-title">No collections yet</p>
        <p class="empty-sub">Create your first collection to start tracking your cards.</p>
        <button class="create-btn" (click)="openCreateForm()">+ New Collection</button>
      </div>

      <!-- Grid -->
      <div class="collection-grid" *ngIf="(collections$ | async)?.length">
        <div
          class="collection-card"
          *ngFor="let col of (collections$ | async)"
          (click)="openCollection(col.id)"
        >
          <!-- Cover art -->
          <div class="col-cover"
               [style.backgroundImage]="coverUri(col) ? 'url(' + coverUri(col) + ')' : 'none'"
               [class.no-cover]="!coverUri(col)">
            <span class="no-cover-icon" *ngIf="!coverUri(col)"><i class="bi bi-image"></i></span>
          </div>

          <div class="col-info">
            <!-- Name or rename input -->
            <h3 class="col-name" *ngIf="renamingColId !== col.id">{{ col.name }}</h3>
            <input
              *ngIf="renamingColId === col.id"
              class="rename-input"
              [(ngModel)]="renameDraft"
              (click)="$event.stopPropagation()"
              (keydown.enter)="commitRename(col)"
              (keydown.escape)="cancelRename()"
              (blur)="commitRename(col)"
              autofocus
            />
            <p class="col-desc" *ngIf="col.description && renamingColId !== col.id">{{ col.description }}</p>

            <div class="col-meta">
              <span class="card-count">{{ col.cardCount }} card{{ col.cardCount !== 1 ? 's' : '' }}</span>

              <div class="col-actions" (click)="$event.stopPropagation()">
                <button class="menu-btn" (click)="toggleMenu($event, col.id)" title="Options"><i class="bi bi-three-dots-vertical"></i></button>

                <div class="col-menu" *ngIf="menuColId === col.id">
                  <button class="menu-item" (click)="startRename($event, col)"><i class="bi bi-pencil"></i> Rename</button>
                  <button class="menu-item" (click)="openCoverPicker($event, col)"><i class="bi bi-image"></i> Set Cover Image</button>
                  <div class="menu-divider"></div>
                  <button class="menu-item menu-item-danger" (click)="deleteCollection($event, col.id)"><i class="bi bi-trash"></i> Delete</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </ng-container>
  </main>

  <!-- Create modal -->
  <div class="modal-overlay" *ngIf="showCreateForm" (click)="closeCreateForm()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>New Collection</h2>
        <button class="modal-close" (click)="closeCreateForm()"><i class="bi bi-x-lg"></i></button>
      </div>
      <form [formGroup]="createForm" (ngSubmit)="submitCreate()" class="modal-body">
        <div class="form-field">
          <label class="form-label">Name</label>
          <input
            class="form-input"
            type="text"
            formControlName="name"
            placeholder="e.g. Modern Staples"
            autofocus
          />
        </div>
        <div class="form-field">
          <label class="form-label">Description <span class="optional">(optional)</span></label>
          <textarea
            class="form-input form-textarea"
            formControlName="description"
            placeholder="What's in this collection?"
            rows="3"
          ></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="cancel-btn" (click)="closeCreateForm()">Cancel</button>
          <button type="submit" class="submit-btn" [disabled]="createForm.invalid">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Cover picker modal -->
  <app-cover-picker-modal
    *ngIf="coverPickerCol"
    [currentCoverUri]="coverPickerCol.coverUri ?? null"
    (coverSelected)="onCoverSelected(coverPickerCol, $event)"
    (closed)="closeCoverPicker()"
  ></app-cover-picker-modal>

</div>
