<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo">&#9670;</div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join MTG Engine</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <label class="field-label" for="username">Username <span class="hint">(min 3 characters)</span></label>
        <input
          id="username"
          class="field-input"
          type="text"
          formControlName="username"
          autocomplete="username"
          placeholder="choose a username"
        />
      </div>

      <div class="field">
        <label class="field-label" for="email">Email</label>
        <input
          id="email"
          class="field-input"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="you@example.com"
        />
      </div>

      <div class="field">
        <label class="field-label" for="password">Password <span class="hint">(min 6 characters)</span></label>
        <input
          id="password"
          class="field-input"
          type="password"
          formControlName="password"
          autocomplete="new-password"
          placeholder="••••••••"
        />
      </div>

      <p class="auth-error" *ngIf="error$ | async as error">{{ error }}</p>

      <button
        class="submit-btn"
        type="submit"
        [disabled]="(loading$ | async) || form.invalid"
      >
        <span *ngIf="!(loading$ | async)">Create Account</span>
        <span *ngIf="loading$ | async">Creating…</span>
      </button>
    </form>

    <p class="auth-link">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
