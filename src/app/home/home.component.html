<div class="home-shell">

  <div class="home-bg">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="bg-orb orb-4"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="home-content">

    <div class="logo-mark">✦</div>

    <h1 class="home-title">
      <span class="title-mtg">MTG</span>
      <span class="title-engine">Engine</span>
    </h1>

    <p class="home-tagline">A pragmatic Magic: The Gathering rules engine</p>

    <div class="mana-row">
      <span *ngFor="let c of colors" class="mana-orb" [ngClass]="'orb-' + c.cls" [title]="c.label"></span>
    </div>

    <div class="cta-row">
      <button class="play-btn" (click)="play()">
        <span class="play-btn-text">Play Game</span>
        <span class="play-btn-arrow">→</span>
      </button>
      <button class="kb-btn" (click)="openKb()">Rules KB</button>
    </div>

    <div class="home-footer">
      Angular · .NET · SignalR · Scryfall
    </div>

  </div>

</div>
