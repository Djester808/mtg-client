<div class="relative flex items-center justify-center h-full bg-void overflow-hidden">
  <div class="absolute inset-0 pointer-events-none">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
  </div>

  <div class="lobby-card">
    <div class="text-center mb-9">
      <div class="block text-[28px] text-gold leading-none mb-2.5 animate-pulse-gold">✦</div>
      <h1 class="font-display text-[32px] font-bold tracking-[0.15em] text-parchment uppercase m-0 mb-1.5">MTG Engine</h1>
      <p class="font-display text-[12px] tracking-[0.2em] text-parchment-faint uppercase m-0">Pragmatic Edition</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="startGame()" class="lobby-form flex flex-col gap-7" autocomplete="off">

      <div class="flex items-end gap-4">
        <div class="flex-1 relative">
          <label class="block font-display text-[9px] tracking-[0.2em] uppercase text-parchment-faint mb-2">Player 1</label>
          <input class="lobby-field" type="text" formControlName="player1Name" placeholder="Enter name">
          <div class="field-accent left"></div>
        </div>

        <div class="font-display text-[11px] tracking-[0.2em] text-parchment-faint pb-2.5 shrink-0">VS</div>

        <div class="flex-1 relative">
          <label class="block font-display text-[9px] tracking-[0.2em] uppercase text-parchment-faint mb-2">Player 2</label>
          <input class="lobby-field" type="text" formControlName="player2Name" placeholder="Enter name">
          <div class="field-accent right"></div>
        </div>
      </div>

      <div>
        <label class="block font-display text-[9px] tracking-[0.2em] uppercase text-parchment-faint mb-2">Starting Deck Preset</label>
        <div class="grid grid-cols-2 gap-2 mt-2">
          <label
            *ngFor="let preset of DECK_PRESETS"
            class="deck-option"
            [class.selected]="form.value.deckPreset === preset.value">
            <input type="radio" formControlName="deckPreset" [value]="preset.value" style="display:none">
            <div class="flex gap-[3px] shrink-0">
              <span *ngFor="let c of preset.colors" class="color-pip" [ngClass]="colorClass(c)">{{ c }}</span>
            </div>
            <span class="font-display text-[10px] tracking-[0.05em] text-parchment-muted">{{ preset.label }}</span>
          </label>
        </div>
      </div>

      <div class="error-msg bg-[rgba(192,57,43,0.1)] border border-solid border-[rgba(192,57,43,0.3)] rounded-lg py-2.5 px-3.5 text-[12px] text-[#e07060] italic"
           *ngIf="error$ | async as err">{{ err }}</div>

      <button type="submit" class="start-btn" [disabled]="form.invalid || (loading$ | async)">
        <span *ngIf="!(loading$ | async)">Begin Game</span>
        <span *ngIf="loading$ | async" class="loading-dots">
          <span></span><span></span><span></span>
        </span>
      </button>

    </form>

    <div class="text-center mt-7 text-[10px] tracking-[0.12em] text-parchment-faint font-display uppercase">
      Phase 1 engine · Angular 17 · .NET 8 · SignalR
    </div>
  </div>
</div>
