<div class="hand-zone">
  <div class="hand-label">Hand — {{ count }} cards</div>
  <div class="hand-cards" (click)="$event.stopPropagation()">
    <div
      *ngFor="let hc of orderedCards; trackBy: trackByCard; let i = index"
      class="hand-card-wrapper"
      [ngClass]="'rot-' + i"
      [class.is-dragging]="hc.card.cardId === draggingId"
      (mousedown)="onWrapperMouseDown($event, hc.card.cardId)">
      <app-card
        [card]="hc.card"
        [isSelected]="hc.isSelected"
        [isCastable]="hc.isCastable"
        [showInfo]="true"
        [style.width.px]="cardDims.w"
        [style.height.px]="cardDims.h"
        (clicked)="onCardClick(hc.card)"
        (dblClicked)="onCardDblClick(hc)"
        (hoverEnter)="onCardHover($event)"
        (hoverLeave)="onCardHoverLeave()">
      </app-card>
    </div>
  </div>
</div>
