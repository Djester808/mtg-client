<div class="cp-overlay" (click)="overlayClick($event)">
  <div class="cp-modal">
    <div class="cp-header">
      <h2>Set Cover Image</h2>
      <button class="cp-close" (click)="close()"><i class="bi bi-x-lg"></i></button>
    </div>

    <div class="cp-search">
      <span class="cp-search-icon"><i class="bi bi-search"></i></span>
      <input
        class="cp-search-input"
        type="text"
        [(ngModel)]="searchText"
        (input)="onInput()"
        placeholder="Search any card by name…"
        autofocus
      />
    </div>

    <div class="cp-body">
      <div class="cp-hint" *ngIf="!searched && !loading">Type a card name to search.</div>
      <div class="cp-loading" *ngIf="loading">Searching…</div>
      <div class="cp-empty" *ngIf="searched && !loading && results.length === 0">No results found.</div>

      <div class="cp-grid" *ngIf="results.length > 0">
        <div
          class="cp-thumb"
          *ngFor="let card of results"
          [class.is-selected]="isSelected(card)"
          (click)="selectCard(card)"
          [title]="card.name"
        >
          <img
            *ngIf="cardImageUri(card)"
            [src]="cardImageUri(card)"
            [alt]="card.name"
          />
          <div class="cp-no-img" *ngIf="!cardImageUri(card)"><i class="bi bi-image"></i></div>
          <div class="cp-check" *ngIf="isSelected(card)"><i class="bi bi-check-lg"></i></div>
        </div>
      </div>
    </div>
  </div>
</div>
