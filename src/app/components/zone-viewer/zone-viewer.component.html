<div
  class="viewer-backdrop"
  *ngIf="vm$ | async as vm"
  (click)="onBackdropClick($event)">
  <div class="viewer-panel" [class.exile]="vm.zone === 'exile'">

    <div class="viewer-header">
      <span class="viewer-title">{{ vm.title }}</span>
      <span class="viewer-count">{{ vm.cards.length }} card{{ vm.cards.length !== 1 ? 's' : '' }}</span>
      <button class="viewer-close" (click)="close()">✕</button>
    </div>

    <div class="viewer-body" *ngIf="vm.cards.length; else emptyZone">
      <div
        *ngFor="let card of vm.cards; trackBy: trackByCard"
        class="viewer-card-slot">
        <app-card
          [card]="card"
          (hoverEnter)="onCardHover($event)"
          (hoverLeave)="onCardHoverLeave()">
        </app-card>
        <div class="viewer-card-name">{{ card.name }}</div>
      </div>
    </div>

    <ng-template #emptyZone>
      <div class="viewer-empty">This zone is empty</div>
    </ng-template>

  </div>
</div>
