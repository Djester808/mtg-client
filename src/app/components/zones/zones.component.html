<div class="battlefield"
  [class.opponent]="isOpponent"
  [class.drop-target]="!isOpponent && dropActive"
  *ngIf="ui$ | async as ui"
  (click)="onBattlefieldClick()"
  (dragover)="onZoneDragOver($event)"
  (dragleave)="onZoneDragLeave()"
  (drop)="onZoneDrop($event)">
  <div class="zone-label">{{ label }}</div>

  <!-- Creatures + non-land permanents -->
  <div class="permanents-row">
    <ng-container *ngFor="let p of nonCreatureNonLand; trackBy: trackByPermanent">
      <app-card
        [permanent]="p"
        [isSelected]="ui.selectedPermId === p.permanentId"
        [isAttacking]="isAttacking(p.permanentId, ui.combat)"
        [isBlocking]="isBlocking(p.permanentId, ui.combat)"
        [isPendingAttacker]="isPendingAttacker(p.permanentId, ui.pendingAttackers)"
        (click)="$event.stopPropagation()"
        (clicked)="onCardClick(p, ui.mode, ui.isActive, ui.pendingAttackers)"
        (hoverEnter)="onCardHover($event)"
        (hoverLeave)="onCardHoverLeave()">
      </app-card>
    </ng-container>

    <ng-container *ngFor="let p of creatures; trackBy: trackByPermanent">
      <app-card
        [permanent]="p"
        [isSelected]="ui.selectedPermId === p.permanentId"
        [isAttacking]="isAttacking(p.permanentId, ui.combat)"
        [isBlocking]="isBlocking(p.permanentId, ui.combat)"
        [isPendingAttacker]="isPendingAttacker(p.permanentId, ui.pendingAttackers)"
        (click)="$event.stopPropagation()"
        (clicked)="onCardClick(p, ui.mode, ui.isActive, ui.pendingAttackers)"
        (hoverEnter)="onCardHover($event)"
        (hoverLeave)="onCardHoverLeave()">
      </app-card>
    </ng-container>
  </div>

  <div class="zone-divider"></div>

  <!-- Lands -->
  <div class="lands-row">
    <ng-container *ngFor="let p of lands; trackBy: trackByPermanent">
      <app-card
        [permanent]="p"
        [isSelected]="ui.selectedPermId === p.permanentId"
        (click)="$event.stopPropagation()"
        (clicked)="onCardClick(p, ui.mode, ui.isActive, ui.pendingAttackers)"
        (hoverEnter)="onCardHover($event)"
        (hoverLeave)="onCardHoverLeave()">
      </app-card>
    </ng-container>
  </div>
</div>
