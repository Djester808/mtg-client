<nav class="navbar">
  <a class="nav-logo" routerLink="/">
    <span class="nav-logo-diamond">&#9670;</span>
    <span class="nav-logo-text">MTG Engine</span>
  </a>

  <div class="nav-links">
    <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a class="nav-link" routerLink="/kb" routerLinkActive="active">Rules KB</a>
    <a class="nav-link" routerLink="/collection" routerLinkActive="active">Collection</a>
    <a class="nav-link" routerLink="/deck" routerLinkActive="active">Decks</a>
    <a class="nav-link" routerLink="/lobby" routerLinkActive="active">Play</a>
  </div>

  <div class="account-menu">
    <ng-container *ngIf="isLoggedIn$ | async; else loggedOut">
      <button class="account-btn" (click)="toggleAccount()">
        <span class="account-icon">&#9670;</span>
        <span class="account-name">{{ username$ | async }}</span>
        <span class="account-caret" [class.open]="accountOpen()">&#9660;</span>
      </button>
      <div class="account-dropdown" *ngIf="accountOpen()">
        <a class="dropdown-item" routerLink="/account">Profile</a>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item danger" (click)="signOut()">Sign Out</button>
      </div>
    </ng-container>

    <ng-template #loggedOut>
      <a class="nav-link" routerLink="/login">Sign In</a>
      <a class="nav-btn" routerLink="/register">Create Account</a>
    </ng-template>
  </div>
</nav>
